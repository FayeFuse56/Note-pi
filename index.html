<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>FayeFuse — Note App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f7f6f3;
  --surface:#ffffff;
  --border:#e8e6e0;
  --text:#1a1915;
  --text-muted:#9a9690;
  --accent:#2c2c2a;
  --accent-soft:#f0efe9;
  --danger:#c0392b;
  --radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --font-display:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-body);color:var(--text);font-size:15px;}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:var(--font-body);color:var(--text);}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ─── LOGIN ─── */
#screen-login{align-items:center;justify-content:center;background:var(--bg);}
.login-box{width:320px;display:flex;flex-direction:column;gap:24px;}
.login-logo{font-family:var(--font-display);font-size:42px;color:var(--text);letter-spacing:-1px;text-align:center;}
.login-logo span{font-style:italic;color:var(--text-muted);}
.login-subtitle{text-align:center;color:var(--text-muted);font-size:13px;font-weight:300;margin-top:-16px;}
.login-fields{display:flex;flex-direction:column;gap:10px;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:14px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:500;letter-spacing:.3px;transition:opacity .2s;}
.login-btn:hover{opacity:.85;}
.login-toggle{text-align:center;font-size:12px;color:var(--text-muted);}
.login-toggle a{color:var(--text);text-decoration:underline;cursor:pointer;}
.login-error{text-align:center;font-size:12px;color:var(--danger);}

/* ─── HOME ─── */
#screen-home{background:var(--bg);}
.home-header{display:flex;align-items:center;gap:12px;padding:16px 20px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
.home-logo{font-family:var(--font-display);font-size:22px;letter-spacing:-.5px;flex:1;}
.home-logo span{font-style:italic;color:var(--text-muted);}
.home-user{font-size:12px;color:var(--text-muted);font-weight:300;}
.home-actions{display:flex;gap:8px;}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text);transition:background .15s;}
.btn-icon:hover{background:var(--accent-soft);}
.btn-icon svg{width:18px;height:18px;}
.home-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);}
.breadcrumb{display:flex;align-items:center;gap:6px;flex:1;font-size:13px;color:var(--text-muted);overflow:hidden;}
.breadcrumb-item{cursor:pointer;white-space:nowrap;}
.breadcrumb-item:hover{color:var(--text);}
.breadcrumb-sep{color:var(--border);}
.btn-new{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;transition:background .15s;}
.btn-new-folder{background:var(--accent-soft);color:var(--text);}
.btn-new-folder:hover{background:#e8e7e0;}
.btn-new-file{background:var(--accent);color:#fff;}
.btn-new-file:hover{opacity:.85;}
.btn-new svg{width:14px;height:14px;}

.home-content{flex:1;overflow-y:auto;padding:20px;}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.item-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative;}
.item-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.item-card.dragging{opacity:.5;}
.item-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
.item-thumb{width:100%;aspect-ratio:4/3;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.item-thumb canvas{width:100%;height:100%;object-fit:cover;}
.item-thumb-folder{font-size:42px;}
.item-info{padding:10px 12px 11px;}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono);}
.item-menu-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(255,255,255,.85);border-radius:6px;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.item-card:hover .item-menu-btn{display:flex;}
.item-menu-btn svg{width:14px;height:14px;}
.context-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:4px;z-index:1000;min-width:150px;}
.context-menu-item{padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.context-menu-item:hover{background:var(--accent-soft);}
.context-menu-item.danger{color:var(--danger);}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-muted);}
.empty-state svg{width:48px;height:48px;opacity:.3;}
.empty-state p{font-size:14px;}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:min(480px,90vw);box-shadow:var(--shadow-lg);}
.modal h3{font-family:var(--font-display);font-size:22px;margin-bottom:18px;}
.modal-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--bg);}
.modal-input:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.modal-btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;}
.modal-btn-cancel{background:var(--accent-soft);}
.modal-btn-ok{background:var(--accent);color:#fff;}

/* Paper type selector */
.paper-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.paper-opt{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.paper-opt.selected{border-color:var(--accent);}
.paper-thumb{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden;}
.paper-label{text-align:center;font-size:12px;padding:6px;font-weight:500;}
.theme-row{display:flex;gap:8px;margin:8px 0 4px;}
.theme-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:transform .15s;}
.theme-dot.selected{border-color:var(--accent);transform:scale(1.15);}
.theme-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;}

/* ─── EDITOR ─── */
#screen-editor{background:#888;}
.editor-header{height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;z-index:100;}
.editor-back{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-muted);cursor:pointer;padding:6px 8px;border-radius:7px;transition:background .15s;}
.editor-back:hover{background:var(--accent-soft);}
.editor-title{font-size:15px;font-weight:500;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.editor-topbar-actions{display:flex;gap:4px;}
.zoom-indicator{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:4px 8px;background:var(--accent-soft);border-radius:6px;min-width:48px;text-align:center;}

/* Tabs */
.pages-tabs{height:40px;min-height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding:0 8px;}
.pages-tabs::-webkit-scrollbar{display:none;}
.page-tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:32px;border-radius:7px;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--text-muted);transition:background .15s;}
.page-tab.active{background:var(--accent-soft);color:var(--text);font-weight:500;}
.page-tab-close{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;opacity:0;}
.page-tab:hover .page-tab-close{opacity:.6;}
.page-tab-add{padding:0 10px;height:32px;display:flex;align-items:center;color:var(--text-muted);font-size:18px;cursor:pointer;flex-shrink:0;}
.page-tab-add:hover{color:var(--text);}

/* Canvas area */
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:#d0cfc9;touch-action:none;}
.canvas-scroll{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.canvas-container{position:relative;transform-origin:center center;}
.canvas-container canvas{display:block;touch-action:none;}
canvas#canvas-bg{position:absolute;top:0;left:0;pointer-events:none;}
canvas#canvas-main{position:absolute;top:0;left:0;}
canvas#canvas-overlay{position:absolute;top:0;left:0;pointer-events:none;}

/* Toolbar */
.editor-toolbar{height:58px;min-height:58px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 10px;overflow-x:auto;scrollbar-width:none;}
.editor-toolbar::-webkit-scrollbar{display:none;}
.tool-sep{width:1px;height:28px;background:var(--border);margin:0 4px;flex-shrink:0;}
.tool-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:9px;position:relative;flex-shrink:0;transition:background .15s;}
.tool-btn:hover{background:var(--accent-soft);}
.tool-btn.active{background:var(--accent);color:#fff;}
.tool-btn svg{width:20px;height:20px;}
.tool-btn .tool-color-dot{position:absolute;bottom:5px;right:5px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--surface);}
.tool-size-slider{width:80px;accent-color:var(--accent);}

/* Color picker popup */
.color-picker-popup{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:var(--shadow-lg);z-index:200;display:none;flex-direction:column;gap:8px;}
.color-picker-popup.open{display:flex;}
.color-swatches{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:var(--accent);}
.color-custom{width:100%;height:28px;border-radius:6px;border:1px solid var(--border);cursor:pointer;}

/* Eraser settings popup */
.eraser-popup{position:absolute;bottom:68px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-lg);z-index:200;display:none;flex-direction:column;gap:8px;min-width:180px;}
.eraser-popup.open{display:flex;}
.eraser-opt{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;}
.eraser-opt input{accent-color:var(--accent);}

/* Lasso */
canvas#canvas-lasso{position:absolute;top:0;left:0;pointer-events:none;}

/* Auto-save indicator */
.autosave-indicator{position:fixed;top:60px;right:14px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);opacity:0;transition:opacity .4s;z-index:300;}
.autosave-indicator.show{opacity:1;}

/* Mobile warning */
#mobile-warning{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#fff;padding:10px 16px;font-size:12px;text-align:center;z-index:999;display:none;}

/* Rename inline */
.item-name-input{font-size:13px;font-weight:500;border:1.5px solid var(--accent);border-radius:5px;padding:1px 5px;width:100%;background:var(--surface);outline:none;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">FayeFuse<span>.</span></div>
    <p class="login-subtitle">สมุดโน้ตของคุณ</p>
    <div class="login-fields">
      <input id="login-username" class="login-input" type="text" placeholder="ชื่อผู้ใช้" autocomplete="off">
      <input id="login-password" class="login-input" type="password" placeholder="รหัสผ่าน">
      <input id="login-password2" class="login-input" type="password" placeholder="ยืนยันรหัสผ่าน" style="display:none">
    </div>
    <p id="login-error" class="login-error"></p>
    <button id="login-btn" class="login-btn">เข้าสู่ระบบ</button>
    <p class="login-toggle"><span id="login-toggle-text">ยังไม่มีบัญชี?</span> <a id="login-toggle-link">สร้างบัญชี</a></p>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="home-header">
    <div class="home-logo">FayeFuse<span>.</span></div>
    <div class="home-user" id="home-username"></div>
    <div class="home-actions">
      <button class="btn-icon" id="btn-export" title="Export ทั้งหมด">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </button>
      <button class="btn-icon" id="btn-import" title="Import">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </button>
      <button class="btn-icon" id="btn-logout" title="ออกจากระบบ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>
  <div class="home-toolbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="btn-new btn-new-folder" id="btn-new-folder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      โฟลเดอร์ใหม่
    </button>
    <button class="btn-new btn-new-file" id="btn-new-file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      ไฟล์ใหม่
    </button>
  </div>
  <div class="home-content">
    <div class="items-grid" id="items-grid"></div>
  </div>
</div>

<!-- EDITOR -->
<div id="screen-editor" class="screen">
  <div class="editor-header">
    <div class="editor-back" id="editor-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      กลับ
    </div>
    <div class="editor-title" id="editor-title"></div>
    <div class="editor-topbar-actions">
      <span class="zoom-indicator" id="zoom-indicator">100%</span>
      <button class="btn-icon" id="btn-undo" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
      </button>
      <button class="btn-icon" id="btn-redo" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
      </button>
    </div>
  </div>
  <div class="pages-tabs" id="pages-tabs">
    <button class="page-tab-add" id="btn-add-page">+</button>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="canvas-scroll" id="canvas-scroll">
      <div class="canvas-container" id="canvas-container">
        <canvas id="canvas-bg"></canvas>
        <canvas id="canvas-main"></canvas>
        <canvas id="canvas-lasso"></canvas>
        <canvas id="canvas-overlay"></canvas>
      </div>
    </div>
  </div>
  <div class="editor-toolbar" id="editor-toolbar">
    <!-- Tools injected by JS -->
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <!-- content injected -->
  </div>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu" style="display:none"></div>

<!-- Auto save indicator -->
<div class="autosave-indicator" id="autosave-indicator">บันทึกแล้ว ✓</div>

<!-- Import input -->
<input type="file" id="import-input" accept=".fayeFuse" style="display:none">

<!-- Mobile warning -->
<div id="mobile-warning">📱 แอปนี้ออกแบบสำหรับ iPad — บนมือถือดูได้ แต่เขียนไม่ได้นะ</div>

<script>
// ─── STATE ───────────────────────────────────────────
const PAPER_W = 2048, PAPER_H = 1536;
let state = {
  users: {},
  currentUser: null,
  data: {} // { username: { items: [], currentPath: [] } }
};
let ui = {
  currentPath: [], // array of folder IDs
  currentFile: null,
  currentPageIdx: 0,
  zoom: 1,
  panX: 0, panY: 0,
  tool: 'pen',
  penColor: '#1a1915', penSize: 3,
  pencilColor: '#555', pencilSize: 2,
  highlightColor: 'rgba(255,220,0,0.4)', highlightSize: 18,
  eraserSize: 20, eraserMode: 'normal', // normal | stroke
  lassoActive: false, lassoPoints: [],
  lassoSelection: null, // {x,y,w,h,imageData}
  lassoDragging: false, lassoOffX: 0, lassoOffY: 0,
  undoStack: [], redoStack: [],
  isDrawing: false,
  lastX: 0, lastY: 0,
  pinchDist: null,
  pinchMidX: 0, pinchMidY: 0,
  pinchZoomStart: 1,
  touchMode: 'none', // 'draw'|'pan'|'pinch'
  touchId: null,
  colorPickerTarget: null, // 'pen'|'pencil'|'highlight'
  autoSaveTimer: null,
};
let pages = []; // current file's pages: array of ImageData or null

// ─── STORAGE ─────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('fayeFuse_state', JSON.stringify({
      users: state.users,
      data: state.data
    }));
  } catch(e) {}
}
function load() {
  try {
    const s = JSON.parse(localStorage.getItem('fayeFuse_state') || '{}');
    if (s.users) state.users = s.users;
    if (s.data) state.data = s.data;
  } catch(e) {}
}
function getUserData() {
  if (!state.data[state.currentUser]) state.data[state.currentUser] = { items: [] };
  return state.data[state.currentUser];
}

// ─── ID ──────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }

// ─── LOGIN ───────────────────────────────────────────
let loginMode = 'login';
document.getElementById('login-toggle-link').onclick = () => {
  loginMode = loginMode === 'login' ? 'register' : 'login';
  const isReg = loginMode === 'register';
  document.getElementById('login-password2').style.display = isReg ? '' : 'none';
  document.getElementById('login-btn').textContent = isReg ? 'สร้างบัญชี' : 'เข้าสู่ระบบ';
  document.getElementById('login-toggle-text').textContent = isReg ? 'มีบัญชีแล้ว?' : 'ยังไม่มีบัญชี?';
  document.getElementById('login-toggle-link').textContent = isReg ? 'เข้าสู่ระบบ' : 'สร้างบัญชี';
  document.getElementById('login-error').textContent = '';
};
document.getElementById('login-btn').onclick = doLogin;
document.getElementById('login-password').onkeydown = e => { if(e.key==='Enter') doLogin(); };
function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const p2 = document.getElementById('login-password2').value;
  const err = document.getElementById('login-error');
  if (!u || !p) { err.textContent = 'กรุณากรอกให้ครบ'; return; }
  if (loginMode === 'register') {
    if (p !== p2) { err.textContent = 'รหัสผ่านไม่ตรงกัน'; return; }
    if (state.users[u]) { err.textContent = 'ชื่อผู้ใช้นี้มีแล้ว'; return; }
    state.users[u] = btoa(p);
    save();
  } else {
    if (!state.users[u] || state.users[u] !== btoa(p)) { err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; return; }
  }
  state.currentUser = u;
  document.getElementById('home-username').textContent = u;
  ui.currentPath = [];
  showScreen('home');
  renderHome();
}

  ui.currentFile = null;
  showScreen('login');
};

function showScreen(id) {

// ─── HOME ─────────────────────────────────────────────
function getItemsAt(path) {
  const d = getUserData();
  if (!path.length) return d.items;
  let cur = d.items;
  for (const id of path) {
    const folder = cur.find(i => i.id === id && i.type === 'folder');
    if (!folder) return [];
    cur = folder.children || [];
  }
  return cur;
}
function getParentItems(path) {
  if (!path.length) return getUserData().items;
  return getItemsAt(path.slice(0, -1));
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const d = getUserData();
  let html = '<span class="breadcrumb-item" data-idx="-1">หน้าหลัก</span>';
  let cur = d.items;
  ui.currentPath.forEach((id, i) => {
    const folder = cur.find(x => x.id === id);
    if (folder) {
      html += '<span class="breadcrumb-sep">›</span>';
      html += `<span class="breadcrumb-item" data-idx="${i}">${folder.name}</span>`;
      cur = folder.children || [];
    }
  });
  el.innerHTML = html;
  el.querySelectorAll('.breadcrumb-item').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      if (idx === -1) ui.currentPath = [];
      else ui.currentPath = ui.currentPath.slice(0, idx+1);
      renderHome();
    };
  });
}

function renderHome() {
  renderBreadcrumb();
  const items = getItemsAt(ui.currentPath);
  const grid = document.getElementById('items-grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>ยังไม่มีไฟล์ สร้างใหม่ได้เลย!</p></div>';
    return;
  }
  grid.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.id = item.id;
    card.draggable = true;

    let thumbHtml = '';
    if (item.type === 'folder') {
      thumbHtml = `<div class="item-thumb"><div class="item-thumb-folder">📁</div></div>`;
    } else {
      const thumbCanvas = document.createElement('canvas');
      thumbCanvas.width = 240; thumbCanvas.height = 180;
      const tctx = thumbCanvas.getContext('2d');
      drawPaperBg(tctx, 240, 180, item.paperType || 'blank', item.paperTheme || 'light', true);
      if (item.pages && item.pages[0]) {
        const img = new Image();
        img.onload = () => { tctx.drawImage(img, 0, 0, 240, 180); };
        img.src = item.pages[0];
      }
      thumbHtml = `<div class="item-thumb">${thumbCanvas.outerHTML}</div>`;
    }

    card.innerHTML = thumbHtml + `
      <div class="item-info">
        <div class="item-name" id="name-${item.id}">${item.name}</div>
        <div class="item-meta">${item.type==='folder' ? (item.children||[]).length+' รายการ' : (item.pages||[]).length+' หน้า'}</div>
      </div>
      <button class="item-menu-btn" data-id="${item.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>`;

    card.onclick = (e) => {
      if (e.target.closest('.item-menu-btn')) return;
      if (item.type === 'folder') {
        ui.currentPath = [...ui.currentPath, item.id];
        renderHome();
      } else {
        openFile(item);
      }
    };

    // Context menu
    card.querySelector('.item-menu-btn').onclick = (e) => {
      e.stopPropagation();
      showContextMenu(e, item);
    };

    // Drag & Drop
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', item.id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => {
      if (item.type === 'folder') { e.preventDefault(); card.classList.add('drag-over'); }
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const dragId = e.dataTransfer.getData('text/plain');
      if (dragId !== item.id && item.type === 'folder') {
        moveItemToFolder(dragId, item.id);
      }
    });

    grid.appendChild(card);
  });
}

function showContextMenu(e, item) {
  const menu = document.getElementById('context-menu');
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth-160)+'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight-150)+'px';
  menu.innerHTML = `
    <div class="context-menu-item" data-action="rename">✏️ เปลี่ยนชื่อ</div>
    <div class="context-menu-item" data-action="move">📂 ย้ายไปโฟลเดอร์</div>
    <div class="context-menu-item danger" data-action="delete">🗑 ลบ</div>`;
  menu.querySelector('[data-action=rename]').onclick = () => { hideContextMenu(); startRename(item); };
  menu.querySelector('[data-action=move]').onclick = () => { hideContextMenu(); showMoveModal(item); };
  menu.querySelector('[data-action=delete]').onclick = () => { hideContextMenu(); deleteItem(item); };
}
function hideContextMenu() { document.getElementById('context-menu').style.display = 'none'; }
document.addEventListener('click', e => { if (!e.target.closest('.context-menu')) hideContextMenu(); });

function startRename(item) {
  const nameEl = document.getElementById('name-'+item.id);
  if (!nameEl) return;
  const input = document.createElement('input');
  input.className = 'item-name-input';
  input.value = item.name;
  nameEl.replaceWith(input);
  input.focus(); input.select();
  const commit = () => {
    const val = input.value.trim() || item.name;
    item.name = val;
    save();
    renderHome();
  };
  input.onblur = commit;
  input.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } };
}

function deleteItem(item) {
  const items = getItemsAt(ui.currentPath);
  const idx = items.findIndex(i => i.id === item.id);
  if (idx >= 0) { items.splice(idx, 1); save(); renderHome(); }
}

function moveItemToFolder(dragId, targetFolderId) {
  const items = getItemsAt(ui.currentPath);
  const dragIdx = items.findIndex(i => i.id === dragId);
  if (dragIdx < 0) return;
  const dragItem = items[dragIdx];
  items.splice(dragIdx, 1);
  const targetFolder = items.find(i => i.id === targetFolderId);
  if (!targetFolder) return;
  if (!targetFolder.children) targetFolder.children = [];
  targetFolder.children.push(dragItem);
  save(); renderHome();
}

function showMoveModal(item) {
  // Collect all folders
  const allFolders = [];
  function collect(arr, path) {
    arr.forEach(i => {
      if (i.type === 'folder' && i.id !== item.id) {
        allFolders.push({ ...i, _path: path });
        collect(i.children || [], path+'/'+i.name);
      }
    });
  }
  collect(getUserData().items, '');
  let html = `<h3>ย้ายไปที่...</h3>`;
  if (!allFolders.length) { html += '<p style="color:var(--text-muted);font-size:13px">ไม่มีโฟลเดอร์ให้ย้าย</p>'; }
  allFolders.forEach(f => {
    html += `<div class="context-menu-item" data-fid="${f.id}">📁 ${f._path}/${f.name}</div>`;
  });
  html += `<div class="modal-actions"><button class="modal-btn modal-btn-cancel" id="modal-cancel">ยกเลิก</button></div>`;
  openModal(html);
  document.querySelectorAll('[data-fid]').forEach(el => {
    el.onclick = () => {
      moveItemToFolder(item.id, el.dataset.fid);
      closeModal();
    };
  });
}

let bgCtx, mainCtx, lassoCtx, overlayCtx;
function initEditor() {
  const bgC = document.getElementById('canvas-bg');
  const mainC = document.getElementById('canvas-main');
  const lassoC = document.getElementById('canvas-lasso');
  const overlayC = document.getElementById('canvas-overlay');
  [bgC, mainC, lassoC, overlayC].forEach(c => { c.width = PAPER_W; c.height = PAPER_H; });
  bgCtx = bgC.getContext('2d');
  mainCtx = mainC.getContext('2d');
  lassoCtx = lassoC.getContext('2d');
  overlayCtx = overlayC.getContext('2d');
  drawPaperBg(bgCtx, PAPER_W, PAPER_H, ui.currentFile.paperType, ui.currentFile.paperTheme, false);
  setupEditorEvents();
}

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const scale = Math.min((ww-40)/PAPER_W, (wh-40)/PAPER_H);
  ui.zoom = scale;
  ui.panX = 0; ui.panY = 0;
  applyTransform();
  updateZoomIndicator();
}

function applyTransform() {
  const cont = document.getElementById('canvas-container');
  cont.style.width = PAPER_W+'px';
  cont.style.height = PAPER_H+'px';
  const wrap = document.getElementById('canvas-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const tx = ww/2 - PAPER_W*ui.zoom/2 + ui.panX;
  const ty = wh/2 - PAPER_H*ui.zoom/2 + ui.panY;
  cont.style.transform = `translate(${tx}px,${ty}px) scale(${ui.zoom})`;
  cont.style.transformOrigin = '0 0';
}
function updateZoomIndicator() {
  document.getElementById('zoom-indicator').textContent = Math.round(ui.zoom*100)+'%';
}

// ─── PAPER BACKGROUND ─────────────────────────────────
function drawPaperBg(ctx, w, h, type, theme, small) {
  const bgColors = { light:'#ffffff', soft:'#fdf6e3', dark:'#1a1a1a' };
  const lineColors = { light:'rgba(0,0,0,0.12)', soft:'rgba(80,60,20,0.18)', dark:'rgba(255,255,255,0.15)' };
  ctx.fillStyle = bgColors[theme] || '#fff';
  ctx.fillRect(0, 0, w, h);
  if (type === 'blank') return;
  ctx.strokeStyle = lineColors[theme] || 'rgba(0,0,0,0.12)';
  ctx.lineWidth = small ? 0.5 : 1.2;
  if (type === 'lined') {
    const spacing = small ? 12 : 52;
    for (let y = spacing; y < h; y += spacing) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
  } else if (type === 'grid') {
    const spacing = small ? 12 : 52;
    for (let y = spacing; y < h; y += spacing) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    for (let x = spacing; x < w; x += spacing) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  }
}

// ─── PAGES ────────────────────────────────────────────
function renderPageTabs() {
  const tabs = document.getElementById('pages-tabs');
  tabs.innerHTML = '';
  pages.forEach((p, i) => {
    const tab = document.createElement('div');
    tab.className = 'page-tab' + (i===ui.currentPageIdx?' active':'');
    tab.innerHTML = `หน้า ${i+1}`;
    if (pages.length > 1) {
      const close = document.createElement('span');
      close.className = 'page-tab-close';
      close.innerHTML = '×';
      close.onclick = e => { e.stopPropagation(); removePage(i); };
      tab.appendChild(close);
    }
    tab.onclick = () => { switchPage(i); };
    tabs.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'page-tab-add';
  addBtn.textContent = '+';
  addBtn.onclick = addPage;
  tabs.appendChild(addBtn);
}

function switchPage(idx) {
  saveCurrentPageCanvas();
  ui.currentPageIdx = idx;
  ui.undoStack = []; ui.redoStack = [];
  loadPage(idx);
  renderPageTabs();
}

function addPage() {
  saveCurrentPageCanvas();
  pages.push(null);
  ui.currentPageIdx = pages.length - 1;
  ui.undoStack = []; ui.redoStack = [];
  loadPage(ui.currentPageIdx);
  renderPageTabs();
  triggerAutoSave();
}

function removePage(idx) {
  if (pages.length <= 1) return;
  pages.splice(idx, 1);
  if (ui.currentPageIdx >= pages.length) ui.currentPageIdx = pages.length-1;
  loadPage(ui.currentPageIdx);
  renderPageTabs();
  triggerAutoSave();
}

function saveCurrentPageCanvas() {
  if (!mainCtx) return;
  pages[ui.currentPageIdx] = document.getElementById('canvas-main').toDataURL('image/png', 0.85);
}

function saveCurrentPageToFile() {
  if (!ui.currentFile || !mainCtx) return;
  saveCurrentPageCanvas();
  ui.currentFile.pages = [...pages];
  save();
}

function loadPage(idx) {
  mainCtx.clearRect(0, 0, PAPER_W, PAPER_H);
  lassoCtx.clearRect(0, 0, PAPER_W, PAPER_H);
  clearLassoSelection();
  const pageData = pages[idx];
  if (pageData) {
    const img = new Image();
    img.onload = () => { mainCtx.drawImage(img, 0, 0); };
    img.src = pageData;
  }
}

// ─── UNDO/REDO ────────────────────────────────────────
function pushUndo() {
  ui.undoStack.push(document.getElementById('canvas-main').toDataURL('image/png', 0.85));
  if (ui.undoStack.length > 40) ui.undoStack.shift();
  ui.redoStack = [];
}

document.getElementById('btn-undo').onclick = () => {
  if (!ui.undoStack.length) return;
  ui.redoStack.push(document.getElementById('canvas-main').toDataURL('image/png', 0.85));
  const prev = ui.undoStack.pop();
  mainCtx.clearRect(0,0,PAPER_W,PAPER_H);
  const img = new Image();
  img.onload = () => mainCtx.drawImage(img,0,0);
  img.src = prev;
};
document.getElementById('btn-redo').onclick = () => {
  if (!ui.redoStack.length) return;
  ui.undoStack.push(document.getElementById('canvas-main').toDataURL('image/png', 0.85));
  const next = ui.redoStack.pop();
  mainCtx.clearRect(0,0,PAPER_W,PAPER_H);
  const img = new Image();
  img.onload = () => mainCtx.drawImage(img,0,0);
  img.src = next;
};

    </button>
    <button class="tool-btn" id="tool-eraser" title="ยางลบ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 20H7L3 16l13-13 7 7-3 10zM6.66 16l2-2"/></svg>
    </button>
    <button class="tool-btn" id="tool-lasso" title="Lasso">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2C6.48 2 2 5.35 2 9.5c0 2.44 1.49 4.62 3.82 6.05L5 22l4.64-3.25C10.4 18.92 11.19 19 12 19c5.52 0 10-3.35 10-7.5S17.52 2 12 2z"/></svg>
    </button>
    <div class="tool-sep"></div>
    <input type="range" class="tool-size-slider" id="size-slider" min="1" max="40" value="${ui.penSize}" title="ขนาด">
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tool-image" title="เพิ่มรูปภาพ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <!-- Color picker popup -->
    <div class="color-picker-popup" id="color-picker-popup">
      <div class="color-swatches" id="color-swatches"></div>
      <input type="color" class="color-custom" id="color-custom">
    </div>
    <!-- Eraser popup -->
    <div class="eraser-popup" id="eraser-popup">
      <div style="font-size:12px;font-weight:500;margin-bottom:4px">โหมดยางลบ</div>
      <label class="eraser-opt"><input type="radio" name="emode" value="normal" ${ui.eraserMode==='normal'?'checked':''}> ลบแบบปกติ</label>
      <label class="eraser-opt"><input type="radio" name="emode" value="stroke" ${ui.eraserMode==='stroke'?'checked':''}> ลบเส้นล่าสุด</label>
    </div>
  `;

  // Image input
  const imgInput = document.createElement('input');
  imgInput.type='file'; imgInput.accept='image/*'; imgInput.style.display='none';
  imgInput.id='img-file-input';
  tb.appendChild(imgInput);

  // Tool buttons
  ['pen','pencil','highlight','eraser','lasso'].forEach(t => {
    document.getElementById('tool-'+t).onclick = (e) => { e.stopPropagation(); setTool(t); };
  });
  // Long press / double click to open color picker for color tools
  ['pen','pencil','highlight'].forEach(t => {
    const btn = document.getElementById('tool-'+t);
    let pressTimer;
    btn.addEventListener('pointerdown', () => { pressTimer = setTimeout(() => { if(ui.tool===t) openColorPicker(t); }, 500); });
    btn.addEventListener('pointerup', () => clearTimeout(pressTimer));
  });
  // Eraser long press for settings
  const eraserBtn = document.getElementById('tool-eraser');
  let eraserTimer;
  eraserBtn.addEventListener('pointerdown', () => { eraserTimer = setTimeout(() => { if(ui.tool==='eraser') toggleEraserPopup(); }, 500); });
  eraserBtn.addEventListener('pointerup', () => clearTimeout(eraserTimer));

  document.getElementById('size-slider').oninput = e => {
    const v = parseInt(e.target.value);
    if (ui.tool==='pen') ui.penSize=v;
    else if (ui.tool==='pencil') ui.pencilSize=v;
    else if (ui.tool==='highlight') ui.highlightSize=v;
    else if (ui.tool==='eraser') ui.eraserSize=v;
  };

  document.getElementById('tool-image').onclick = () => imgInput.click();
  imgInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(600/img.width, 400/img.height, 1);
        const w = img.width*scale, h = img.height*scale;
        const x = (PAPER_W-w)/2, y = (PAPER_H-h)/2;
        pushUndo();
        mainCtx.drawImage(img, x, y, w, h);
        triggerAutoSave();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value='';
  };

  // Color swatches
  const swatches = document.getElementById('color-swatches');
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className='color-swatch';
    s.style.background=c;
    if (c==='#ffffff') s.style.border='2px solid #ccc';
    s.onclick = () => applyColor(c);
    swatches.appendChild(s);
  });
  document.getElementById('color-custom').oninput = e => applyColor(e.target.value);

  // Eraser radio
  document.querySelectorAll('input[name=emode]').forEach(r => {
    r.onchange = () => { ui.eraserMode = r.value; };
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#color-picker-popup') && !e.target.closest('#tool-pen') && !e.target.closest('#tool-pencil') && !e.target.closest('#tool-highlight'))
      document.getElementById('color-picker-popup').classList.remove('open');
    if (!e.target.closest('#eraser-popup') && !e.target.closest('#tool-eraser'))
      document.getElementById('eraser-popup').classList.remove('open');
  });

  setTool('pen');
}

function setTool(t) {
  ui.tool = t;
  ui.lassoActive = (t === 'lasso');
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-'+t);
  if (btn) btn.classList.add('active');
  const slider = document.getElementById('size-slider');
  if (slider) {
    if (t==='pen') slider.value=ui.penSize;
    else if (t==='pencil') slider.value=ui.pencilSize;
    else if (t==='highlight') slider.value=ui.highlightSize;
    else if (t==='eraser') slider.value=ui.eraserSize;
  }
  if (t !== 'lasso') clearLassoSelection();
}

function openColorPicker(target) {
  ui.colorPickerTarget = target;
  const popup = document.getElementById('color-picker-popup');
  const btn = document.getElementById('tool-'+target);
  popup.classList.toggle('open');
  // Position near button
  const rect = btn.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  popup.style.transform = 'none';
}

function applyColor(c) {
  const t = ui.colorPickerTarget || ui.tool;
  if (t==='pen') { ui.penColor=c; const d=document.getElementById('dot-pen'); if(d) d.style.background=c; }
  else if (t==='pencil') { ui.pencilColor=c; const d=document.getElementById('dot-pencil'); if(d) d.style.background=c; }
  else if (t==='highlight') {
    const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    ui.highlightColor=`rgba(${r},${g},${b},0.4)`;
    const d=document.getElementById('dot-highlight'); if(d) d.style.background=`rgba(${r},${g},${b},0.8)`;
  }
  document.getElementById('color-picker-popup').classList.remove('open');
}

function toggleEraserPopup() {
  document.getElementById('eraser-popup').classList.toggle('open');
}

// ─── DRAWING EVENTS ───────────────────────────────────
let strokeHistory = []; // for stroke-mode eraser

function setupEditorEvents() {
  const mainC = document.getElementById('canvas-main');
  const wrap = document.getElementById('canvas-wrap');

  // Pointer events on canvas
  mainC.addEventListener('pointerdown', onPointerDown, { passive: false });
  mainC.addEventListener('pointermove', onPointerMove, { passive: false });
  mainC.addEventListener('pointerup', onPointerUp, { passive: false });
  mainC.addEventListener('pointercancel', onPointerUp, { passive: false });

  // Touch on wrap for pinch/pan
  wrap.addEventListener('touchstart', onWrapTouch, { passive: false });
  wrap.addEventListener('touchmove', onWrapTouchMove, { passive: false });
  wrap.addEventListener('touchend', onWrapTouchEnd, { passive: false });
}

function canvasPoint(e) {
  const mainC = document.getElementById('canvas-main');
  const rect = mainC.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / ui.zoom * (rect.width / mainC.offsetWidth) + 0,
    y: (e.clientY - rect.top) / ui.zoom * (rect.height / mainC.offsetHeight) + 0,
  };
}
function canvasPointRaw(e) {
  const mainC = document.getElementById('canvas-main');
  const rect = mainC.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (PAPER_W / rect.width),
    y: (e.clientY - rect.top) * (PAPER_H / rect.height),
  };
}

function isPencilInput(e) {
  return e.pointerType === 'pen' || (e.pointerType === 'mouse' && e.buttons > 0);
}

function onPointerDown(e) {
  e.preventDefault();
  if (!isPencilInput(e)) return; // finger only pans/zooms
  const p = canvasPointRaw(e);
  ui.isDrawing = true;
  ui.lastX = p.x; ui.lastY = p.y;
  ui.touchId = e.pointerId;

  if (ui.tool === 'lasso') {
    // Start lasso
    if (ui.lassoSelection && pointInRect(p, ui.lassoSelection)) {
      ui.lassoDragging = true;
      ui.lassoOffX = p.x - ui.lassoSelection.x;
      ui.lassoOffY = p.y - ui.lassoSelection.y;
    } else {
      commitLasso();
      ui.lassoPoints = [p];
      lassoCtx.clearRect(0,0,PAPER_W,PAPER_H);
    }
    return;
  }

  if (ui.eraserMode === 'stroke' && ui.tool === 'eraser') {
    if (strokeHistory.length > 0) {
      pushUndo();
      mainCtx.clearRect(0,0,PAPER_W,PAPER_H);
      const prev = strokeHistory.pop();
      const img = new Image();
      img.onload = () => mainCtx.drawImage(img,0,0);
      img.src = prev;
    }
    ui.isDrawing = false;
    return;
  }

  pushUndo();
  if (ui.tool !== 'eraser') strokeHistory.push(document.getElementById('canvas-main').toDataURL('image/png',0.7));
  if (strokeHistory.length > 20) strokeHistory.shift();

  mainCtx.beginPath();
  mainCtx.moveTo(p.x, p.y);
}

function onPointerMove(e) {
  e.preventDefault();
  if (!isPencilInput(e)) return;
  const p = canvasPointRaw(e);

  if (ui.tool === 'lasso') {
    if (ui.lassoDragging && ui.lassoSelection) {
      const nx = p.x - ui.lassoOffX, ny = p.y - ui.lassoOffY;
      const dx = nx - ui.lassoSelection.x, dy = ny - ui.lassoSelection.y;
      moveLassoSelection(dx, dy);
      ui.lassoSelection.x = nx; ui.lassoSelection.y = ny;
    } else if (ui.isDrawing) {
      ui.lassoPoints.push(p);
      lassoCtx.clearRect(0,0,PAPER_W,PAPER_H);
      lassoCtx.strokeStyle='rgba(52,152,219,0.8)'; lassoCtx.lineWidth=2; lassoCtx.setLineDash([6,4]);
      lassoCtx.beginPath();
      ui.lassoPoints.forEach((pt,i) => i===0 ? lassoCtx.moveTo(pt.x,pt.y) : lassoCtx.lineTo(pt.x,pt.y));
      lassoCtx.closePath(); lassoCtx.stroke(); lassoCtx.setLineDash([]);
    }
    return;
  }

  if (!ui.isDrawing) return;

  const pressure = e.pressure || 0.5;
  mainCtx.lineCap = 'round'; mainCtx.lineJoin = 'round';

  if (ui.tool === 'pen') {
    mainCtx.globalCompositeOperation = 'source-over';
    mainCtx.strokeStyle = ui.penColor;
    mainCtx.lineWidth = ui.penSize * pressure * 1.5 + 0.5;
    mainCtx.globalAlpha = 1;
  } else if (ui.tool === 'pencil') {
    mainCtx.globalCompositeOperation = 'source-over';
    mainCtx.strokeStyle = ui.pencilColor;
    mainCtx.lineWidth = ui.pencilSize;
    mainCtx.globalAlpha = 0.45 + pressure * 0.45;
  } else if (ui.tool === 'highlight') {
    mainCtx.globalCompositeOperation = 'multiply';
    mainCtx.strokeStyle = ui.highlightColor;
    mainCtx.lineWidth = ui.highlightSize;
    mainCtx.globalAlpha = 1;
  } else if (ui.tool === 'eraser') {
    mainCtx.globalCompositeOperation = 'destination-out';
    mainCtx.strokeStyle = 'rgba(0,0,0,1)';
    mainCtx.lineWidth = ui.eraserSize;
    mainCtx.globalAlpha = 1;
  }

  mainCtx.lineTo(p.x, p.y);
  mainCtx.stroke();
  mainCtx.beginPath();
  mainCtx.moveTo(p.x, p.y);

  ui.lastX = p.x; ui.lastY = p.y;
  triggerAutoSave();
}

function onPointerUp(e) {
  if (ui.tool === 'lasso') {
    if (ui.lassoDragging) {
      ui.lassoDragging = false;
      triggerAutoSave();
    } else if (ui.isDrawing && ui.lassoPoints.length > 3) {
      finishLasso();
    }
    ui.isDrawing = false;
    return;
  }
  mainCtx.globalAlpha = 1;
  mainCtx.globalCompositeOperation = 'source-over';
  ui.isDrawing = false;
}

// ─── LASSO ────────────────────────────────────────────
function finishLasso() {
  const pts = ui.lassoPoints;
  if (pts.length < 3) return;
  const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
  const minX=Math.max(0,Math.floor(Math.min(...xs))), minY=Math.max(0,Math.floor(Math.min(...ys)));
  const maxX=Math.min(PAPER_W,Math.ceil(Math.max(...xs))), maxY=Math.min(PAPER_H,Math.ceil(Math.max(...ys)));
  const w=maxX-minX, h=maxY-minY;
  if (w<2||h<2) return;
  // Extract region
  const imageData = mainCtx.getImageData(minX, minY, w, h);
  pushUndo();
  mainCtx.clearRect(minX, minY, w, h);
  ui.lassoSelection = { x:minX, y:minY, w, h, imageData };
  // Draw selection outline
  lassoCtx.clearRect(0,0,PAPER_W,PAPER_H);
  lassoCtx.strokeStyle='rgba(52,152,219,0.9)'; lassoCtx.lineWidth=2; lassoCtx.setLineDash([6,4]);
  lassoCtx.beginPath();
  pts.forEach((p,i)=>i===0?lassoCtx.moveTo(p.x,p.y):lassoCtx.lineTo(p.x,p.y));
  lassoCtx.closePath(); lassoCtx.stroke(); lassoCtx.setLineDash([]);
  // Draw preview on overlay
  const tmpC = document.createElement('canvas'); tmpC.width=PAPER_W; tmpC.height=PAPER_H;
  const tctx = tmpC.getContext('2d');
  tctx.putImageData(imageData, minX, minY);
  overlayCtx.clearRect(0,0,PAPER_W,PAPER_H);
  overlayCtx.drawImage(tmpC,0,0);
  ui.isDrawing = false;
}

function moveLassoSelection(dx, dy) {
  if (!ui.lassoSelection) return;
  const s = ui.lassoSelection;
  const nx = Math.max(0, s.x+dx), ny = Math.max(0, s.y+dy);
  overlayCtx.clearRect(0,0,PAPER_W,PAPER_H);
  const tmpC = document.createElement('canvas'); tmpC.width=PAPER_W; tmpC.height=PAPER_H;
  const tctx = tmpC.getContext('2d');
  tctx.putImageData(s.imageData, 0, 0);
  overlayCtx.drawImage(tmpC, nx-s.x+0, ny-s.y+0, PAPER_W, PAPER_H);
}

function commitLasso() {
  if (!ui.lassoSelection) return;
  const s = ui.lassoSelection;
  const tmpC = document.createElement('canvas'); tmpC.width=PAPER_W; tmpC.height=PAPER_H;
  const tctx = tmpC.getContext('2d');
  tctx.putImageData(s.imageData, s.x, s.y);
  mainCtx.drawImage(tmpC, 0, 0);
  overlayCtx.clearRect(0,0,PAPER_W,PAPER_H);
  lassoCtx.clearRect(0,0,PAPER_W,PAPER_H);
  ui.lassoSelection = null;
  triggerAutoSave();
}

function clearLassoSelection() {
  if (ui.lassoSelection) commitLasso();
  ui.lassoPoints = [];
  if (lassoCtx) lassoCtx.clearRect(0,0,PAPER_W,PAPER_H);
  if (overlayCtx) overlayCtx.clearRect(0,0,PAPER_W,PAPER_H);
  ui.lassoSelection = null;
}

function pointInRect(p, r) {
  return p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h;
}

// ─── TOUCH PAN / PINCH ────────────────────────────────
let touchStartX, touchStartY, touchStartPanX, touchStartPanY;
let touch1, touch2;

function onWrapTouch(e) {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (t.touchType === 'stylus' || e.target.id === 'canvas-main') return;
    touchStartX = t.clientX; touchStartY = t.clientY;
    touchStartPanX = ui.panX; touchStartPanY = ui.panY;
    ui.touchMode = 'pan';
  } else if (e.touches.length === 2) {
    e.preventDefault();
    touch1 = e.touches[0]; touch2 = e.touches[1];
    ui.pinchDist = Math.hypot(touch2.clientX-touch1.clientX, touch2.clientY-touch1.clientY);
    ui.pinchZoomStart = ui.zoom;
    ui.pinchMidX = (touch1.clientX+touch2.clientX)/2;
    ui.pinchMidY = (touch1.clientY+touch2.clientY)/2;
    ui.touchMode = 'pinch';
  }
}

function onWrapTouchMove(e) {
  e.preventDefault();
  if (ui.touchMode === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    ui.panX = touchStartPanX + (t.clientX - touchStartX);
    ui.panY = touchStartPanY + (t.clientY - touchStartY);
    applyTransform();
  } else if (ui.touchMode === 'pinch' && e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    const scale = dist / ui.pinchDist;
    ui.zoom = Math.max(0.2, Math.min(5, ui.pinchZoomStart * scale));
    applyTransform();
    updateZoomIndicator();
  }
}

function onWrapTouchEnd(e) {
  if (e.touches.length === 0) { ui.touchMode = 'none'; ui.pinchDist = null; }
}

// ─── MOBILE WARNING ───────────────────────────────────
function checkDevice() {
  const isIPad = /iPad/.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && /MacIntel/.test(navigator.platform));
  const isPhone = /iPhone|Android/.test(navigator.userAgent) && !isIPad;
  if (isPhone) document.getElementById('mobile-warning').style.display = 'block';
}
checkDevice();

// ─── INIT ─────────────────────────────────────────────
load();
// Auto re-login if last session
const lastUser = localStorage.getItem('fayeFuse_last_user');
if (lastUser && state.users[lastUser]) {
  // Don't auto-login for security, just pre-fill
  document.getElementById('login-username').value = lastUser;
}

// Hide context menu on scroll
document.getElementById('items-grid')?.addEventListener('scroll', hideContextMenu);
</script>

<!-- Help guide hidden until first use -->
<script>
// Show help on first login
function maybeShowHelp() {
  const key = 'fayeFuse_help_shown_' + state.currentUser;
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, '1');
    setTimeout(showHelp, 600);
  }
}
const origDoLogin = doLogin;

function showHelp() {
  openModal(`
    <h3>วิธีใช้ FayeFuse 📖</h3>
    <div style="font-size:13px;line-height:1.8;color:var(--text)">
      <b>หน้าหลัก</b><br>
      • กด <b>+ โฟลเดอร์ใหม่</b> เพื่อสร้างโฟลเดอร์<br>
      • กด <b>+ ไฟล์ใหม่</b> แล้วเลือกรูปแบบกระดาษ<br>
      • ลากไฟล์ไปวางบนโฟลเดอร์เพื่อย้ายได้เลย<br>
      • กดปุ่ม ⋮ ค้างที่การ์ดเพื่อ rename / ย้าย / ลบ<br>
      • ปุ่ม ↓ Export ทั้งหมดเป็นไฟล์ .fayeFuse<br><br>
      <b>ในไฟล์ (Editor)</b><br>
      • <b>Apple Pencil</b> = วาด / เขียน<br>
      • <b>นิ้ว 1 นิ้ว</b> = เลื่อน canvas<br>
      • <b>นิ้ว 2 นิ้ว</b> = Pinch zoom เข้า/ออก<br>
      • กดค้างที่ปุ่ม ปากกา/ดินสอ/ไฮไลท์ เพื่อเปลี่ยนสี<br>
      • กดค้างที่ปุ่ม ยางลบ เพื่อเลือกโหมดลบ<br>
      • <b>Lasso</b> = วงเลือกแล้วลากย้ายได้<br>
      • + ด้านบนแท็บ = เพิ่มหน้า<br>
      • Auto-save ทำงานอัตโนมัติทุก 2 วิ<br>
    </div>
    <div class="modal-actions"><button class="modal-btn modal-btn-ok" id="modal-cancel">เข้าใจแล้ว!</button></div>
  `);
}

// Wrap login to show help
const _origLoginBtn = document.getElementById('login-btn');
_origLoginBtn.addEventListener('click', () => {
  setTimeout(() => {
    if (state.currentUser) maybeShowHelp();
  }, 300);
}, true);
</script>
